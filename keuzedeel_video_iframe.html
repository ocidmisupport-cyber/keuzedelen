"title": "Werk/school: Bestanden delen", "url": "https://support.microsoft.com/nl-nl/office/bestanden-en-mappen-delen-in-microsoft-365-business-72f26d6c-bf9e-432c-8b96-e3c2437f5b65?wt.mc_id=otc_onedrive"}, {"title": "Persoonlijk: Bestanden uploaden", "url": "https://support.microsoft.com/nl-nl/office/bestanden-en-mappen-uploaden-naar-onedrive-a5710114-6aeb-4bf5-a336-dffa7cc0b77a?wt.mc_id=otc_onedrive"}, {"title": "Persoonlijk: Wat is OneDrive?", "url": "https://support.microsoft.com/nl-nl/office/video-wat-is-onedrive-persoonlijk-a7707a86-7a07-4147-839a-40928b7f1d2c?wt.mc_id=otc_onedrive"}, {"title": "Persoonlijk: Uploaden in OneDrive", "url": "https://support.microsoft.com/nl-nl/office/bestanden-en-mappen-uploaden-naar-onedrive-7f630d4a-0af2-40f9-a32a-de5f149eb1de?wt.mc_id=otc_onedrive"}, {"title": "Persoonlijk: Bestanden delen", "url": "https://support.microsoft.com/nl-nl/office/bestanden-en-mappen-delen-in-onedrive-persoonlijk-3fcefa26-1371-401e-8c04-589de81ed5eb?wt.mc_id=otc_onedrive"}]}, {"name": "Windows", "color": "#0078d4", "count": 8, "links": [{"title": "Windows Support", "url": "https://support.microsoft.com/nl-nl/windows"}, {"title": "Startmenu", "url": "https://support.microsoft.com/nl-nl/search/results?query=Windows%2011%20startmenu"}, {"title": "Verkenner", "url": "https://support.microsoft.com/nl-nl/search/results?query=Windows%20verkenner"}, {"title": "Windows Update", "url": "https://support.microsoft.com/nl-nl/search/results?query=Windows%20Update"}, {"title": "Schermafbeelding maken", "url": "https://support.microsoft.com/nl-nl/search/results?query=Windows%20schermafbeelding"}, {"title": "Sneltoetsen", "url": "https://support.microsoft.com/nl-nl/search/results?query=Windows%20sneltoetsen"}, {"title": "Android-telefoon instellen", "url": "https://support.microsoft.com/nl-nl/office/video-uw-android-telefoon-of-tablet-instellen-641d280a-c05d-47a5-8f85-bc03b0d92a8a"}, {"title": "Gegevens veilig houden", "url": "https://support.microsoft.com/nl-nl/office/houd-uw-gegevens-veilig-87f64a1b-4019-41bb-aab9-c39ccf4de120"}]}];
const stage = document.getElementById('stage');
const homeBtn = document.getElementById('homeBtn');

function iconSvg(name){
  const map={
    Word:`<svg viewBox="0 0 64 64"><rect x="10" y="8" width="44" height="48" rx="8" fill="#185ABD"/><path d="M18 20h5l3 16 4-13h4l4 13 3-16h5l-5 24h-5l-4-14-4 14h-5z" fill="white"/></svg>`,
    Excel:`<svg viewBox="0 0 64 64"><rect x="10" y="8" width="44" height="48" rx="8" fill="#107C41"/><path d="M22 22h6l4 6 4-6h6l-7 10 7 10h-6l-4-6-4 6h-6l7-10z" fill="white"/></svg>`,
    PowerPoint:`<svg viewBox="0 0 64 64"><circle cx="32" cy="32" r="24" fill="#D24726"/><path d="M24 18h12c7 0 11 4 11 10 0 7-5 11-12 11h-4v9h-7zm7 6v9h4c3 0 5-1 5-4s-2-5-5-5z" fill="white"/></svg>`,
    Outlook:`<svg viewBox="0 0 64 64"><rect x="8" y="14" width="48" height="36" rx="8" fill="#0A64C9"/><path d="M16 22l16 12 16-12" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><circle cx="22" cy="32" r="8" fill="#084EA3"/><path d="M20 27h4a5 5 0 010 10h-4z" fill="white"/></svg>`,
    Teams:`<svg viewBox="0 0 64 64"><rect x="10" y="16" width="30" height="32" rx="8" fill="#5B5FC7"/><circle cx="47" cy="24" r="7" fill="#7B83EB"/><circle cx="50" cy="40" r="8" fill="#7B83EB"/><path d="M19 24h18v6h-6v16h-6V30h-6z" fill="white"/></svg>`,
    OneDrive:`<svg viewBox="0 0 64 64"><path d="M18 42c-6 0-10-4-10-9 0-5 4-9 9-9 1-8 8-14 17-14 8 0 14 4 17 11 5 1 9 5 9 10 0 6-5 11-12 11z" fill="#117BD3"/><path d="M22 43c-4 0-7-3-7-6 0-4 3-7 7-7 1-6 6-10 12-10 6 0 10 3 12 8 4 1 7 4 7 8 0 4-4 7-9 7z" fill="#4ea7ef"/></svg>`,
    Windows:`<svg viewBox="0 0 64 64"><path d="M10 12l20-3v22H10zm24-3l20-3v25H34zM10 35h20v20l-20-3zm24 0h20v23l-20-3z" fill="#0078D4"/></svg>`
  };
  return map[name] || map.Windows;
}
function hexToRgba(hex,a){const h=hex.replace('#','');const n=parseInt(h,16);const r=(n>>16)&255,g=(n>>8)&255,b=n&255;return `rgba(${r},${g},${b},${a})`;}
function bgStyle(color){return `background:linear-gradient(135deg, ${hexToRgba(color,.92)}, ${hexToRgba(color,.62)}), linear-gradient(135deg, rgba(255,255,255,.16), rgba(255,255,255,.08)); border:1px solid rgba(255,255,255,.18);`;}
function ellipsePoint(cx,cy,rx,ry,i,total,start=-Math.PI/2){const ang=start + (Math.PI*2*i)/total; return {x:cx + Math.cos(ang)*rx, y:cy + Math.sin(ang)*ry};}
function clearStage(){stage.innerHTML='';}
function addOrbit(cx,cy,rx,ry){const d=document.createElement('div');d.className='orbit';d.style.width=(rx*2)+'px';d.style.height=(ry*2)+'px';d.style.left=cx+'px';d.style.top=cy+'px';stage.appendChild(d);return d;}
function makeNode(tag, className, html, x, y, extraStyle=''){const el=document.createElement(tag);el.className=`node ${className} glass`;el.innerHTML=html;el.style.left=x+'px';el.style.top=y+'px';el.style.cssText += ';'+extraStyle;stage.appendChild(el);return el;}
function appHtml(cat){return `<div class="icon-wrap">${iconSvg(cat.name)}</div><div class="label"><strong>${cat.name}</strong><span>${cat.count} links</span></div>`;}
function linkHtml(title){return `<div class="link-text">${title}</div>`;}
function calcLinkStyle(title){
  const len = title.length;
  let w = 90, h = 42, fs = 11.5;
  if(len > 14) w = 98;
  if(len > 20) { w = 106; h = 46; }
  if(len > 28) { w = 114; h = 50; fs = 11; }
  if(len > 38) { w = 122; h = 54; fs = 10.6; }
  return `width:${w}px;height:${h}px;font-size:${fs}px;`;
}
function animateToDetail(cat, clickedItem){
  const centerNode = stage.querySelector('.center');
  const homeItems = Array.from(stage.querySelectorAll('.home-item'));
  const orbits = Array.from(stage.querySelectorAll('.orbit'));
  homeItems.forEach(item => {
    if(item === clickedItem){
      item.classList.add('move-center');
      item.style.zIndex = '12';
    } else {
      item.classList.add('fade-away');
    }
  });
  if(centerNode) centerNode.classList.add('fade-away');
  orbits.forEach(o => o.classList.add('fade-away'));
  setTimeout(() => renderDetail(cat), 430);
}


function renderHome(){
  clearStage();
  homeBtn.hidden=true;
  const cx=500, cy=215;
  addOrbit(cx,cy,372,154);
  makeNode('div','center',`<div class="label"><strong>Keuzedeel K0022</strong><span>Digitale vaardigheden</span></div>`,cx,cy,'justify-content:center; text-align:center; width:280px; height:132px; background:linear-gradient(135deg, rgba(17,123,211,.45), rgba(91,95,199,.35));');
  categories.forEach((cat,i)=>{
    const p=ellipsePoint(cx,cy,372,154,i,categories.length);
    const item=makeNode('button','home-item',appHtml(cat),p.x,p.y,bgStyle(cat.color));
    item.type='button';
    item.addEventListener('click',()=>animateToDetail(cat, item));
  });
}



function renderDetail(cat){
  clearStage();
  homeBtn.hidden=false;
  const cx=500, cy=215;
  makeNode('div','center detail-in',appHtml(cat),cx,cy,bgStyle(cat.color)+'justify-content:center; text-align:center; width:250px; height:122px; animation-delay:0ms;');
  const links=cat.links;

  let rx = 398, ry = 164;
  if(links.length >= 10) { rx = 406; ry = 168; }
  if(links.length >= 14) { rx = 414; ry = 172; }
  if(links.length >= 18) { rx = 420; ry = 176; }

  const orbit = addOrbit(cx,cy,rx,ry);
  orbit.classList.add('detail-in');

  const startAngle = links.length >= 14 ? (-Math.PI / 2) + (Math.PI * 2 / links.length) / 2 : -Math.PI / 2;
  links.forEach((link,i)=>{
    const p = ellipsePoint(cx,cy,rx,ry,i,links.length,startAngle);
    const a = makeNode('a','link-item detail-in',linkHtml(link.title),p.x,p.y,
      'background:linear-gradient(135deg, rgba(255,255,255,.21), rgba(255,255,255,.1));'
      + calcLinkStyle(link.title)
      + `animation-delay:${70 + i*35}ms;`
    );
    a.href=link.url; a.target='_blank'; a.rel='noopener';
  });
}

document.getElementById('homeBtn').addEventListener('click', renderHome);
renderHome();
</script>
