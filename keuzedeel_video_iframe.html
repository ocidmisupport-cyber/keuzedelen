<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Keuzedeel K0022 Digitale vaardigheden - video iframe</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: Arial, Helvetica, sans-serif;
  }

  .iframe-stage {
    width: 1000px;
    height: 500px;
    position: relative;
    overflow: hidden;
    background: #000;
  }

  .iframe-stage video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 1;
    opacity: .58;
    filter: saturate(1.15) contrast(1.05) brightness(.78);
  }

  .video-shade {
    position: absolute;
    inset: 0;
    z-index: 2;
    background:
      radial-gradient(circle at center, rgba(0,0,0,.08), rgba(0,0,0,.48)),
      linear-gradient(135deg, rgba(9,16,35,.45), rgba(12,18,38,.22));
    pointer-events: none;
  }

  .content-frame {
    position: absolute;
    inset: 0;
    width: 1000px;
    height: 500px;
    border: 0;
    z-index: 3;
    background: transparent;
  }
</style>
</head>
<body>
  <div class="iframe-stage">
    <video autoplay muted loop playsinline preload="auto">
      <source src="introvideo.mp4" type="video/mp4">
    </video>
    <div class="video-shade"></div>
    <iframe class="content-frame" src="keuzedeel_content.html" title="Keuzedeel K0022 Digitale vaardigheden"></iframe>
  </div>
</body>
</html>
